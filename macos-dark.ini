[skin]
    description = macOS Dark color scheme
    truecolors = true

[Lines]
    horiz = ─
    vert = │
    lefttop = ┌
    righttop = ┐
    leftbottom = └
    rightbottom = ┘
    topmiddle = ┬
    bottommiddle = ┴
    leftmiddle = ├
    rightmiddle = ┤
    cross = ┼
    dhoriz = ═
    dvert = ║
    dlefttop = ╔
    drighttop = ╗
    dleftbottom = ╚
    drightbottom = ╝
    dtopmiddle = ╤
    dbottommiddle = ╧
    dleftmiddle = ╟
    drightmiddle = ╢

[core]
    _default_ = #e0e0e0;#282828
    selected = #ffffff;#0a84ff
    marked = #0a84ff;#282828
    markselect = #ffffff;#0064c8
    gauge = #ffffff;#0a84ff
    input = #e0e0e0;#3b3b3d
    inputunchanged = #98989d;#3b3b3d
    inputmark = #ffffff;#3f638b
    disabled = #98989d;#282828
    reverse = #282828;#e0e0e0
    commandlinemark = #ffffff;#3f638b
    header = #e0e0e0;#3b3b3d
    inputhistory = #e0e0e0;#3b3b3d
    commandhistory =
    shadow = #000000;#000000

[dialog]
    _default_ = #e0e0e0;#323232
    dfocus = #ffffff;#0a84ff
    dhotnormal = #0a84ff;#323232
    dhotfocus = #ffffff;#0a84ff
    dtitle = #e0e0e0;#323232

[error]
    _default_ = #ffffff;#ff453a
    errdfocus = #e0e0e0;#3b3b3d
    errdhotnormal = #ffd60a;#ff453a
    errdhotfocus = #ffd60a;#3b3b3d
    errdtitle = #ffffff;#ff453a

[filehighlight]
    directory = #0a84ff;
    executable = #32d74b;
    symlink = #98989d;
    hardlink =
    stalelink = #ff453a;
    device = #ff9f0a;
    special = #bf5af2;
    core = #ff453a;
    temp = #98989d;
    archive = #bf5af2;
    doc = #0a84ff;
    source = #32d74b;
    media = #ff375f;
    graph = #5ac8f5;
    database = #5e5ce6;

[menu]
    _default_ = #e0e0e0;#323232
    menusel = #ffffff;#0a84ff
    menuhot = #0a84ff;#323232
    menuhotsel = #ffffff;#0a84ff
    menuinactive = #98989d;#323232

[popupmenu]
    _default_ = #e0e0e0;#323232
    menusel = #ffffff;#0a84ff
    menutitle = #e0e0e0;#323232

[buttonbar]
    hotkey = #0a84ff;#3b3b3d
    button = #e0e0e0;#3b3b3d

[statusbar]
    _default_ = #e0e0e0;#3b3b3d

[help]
    _default_ = #e0e0e0;#323232
    helpitalic = #ff9f0a;#323232
    helpbold = #ffffff;#323232
    helplink = #0a84ff;#323232
    helpslink = #ffffff;#0a84ff
    helptitle = #e0e0e0;#323232

[editor]
    _default_ = #e0e0e0;#282828
    editbold = #0a84ff;#282828
    editmarked = #e0e0e0;#3f638b
    editwhitespace = #3b3b3d;#282828
    editlinestate = #98989d;#323232
    bookmark = #ffffff;#ff453a
    bookmarkfound = #282828;#32d74b
    editrightmargin = #323232;#282828
#    editbg =
#    editframe =
    editframeactive = #0a84ff;
    editframedrag = #98989d;

[viewer]
    _default_ = #e0e0e0;#282828
    viewbold = #0a84ff;#282828
    viewunderline = #5e5ce6;#282828
    viewselected = #e0e0e0;#3f638b

[diffviewer]
    added = #32d74b;#282828
    changedline = #0a84ff;#282828
    changednew = #ff9f0a;#282828
    changed = #ffd60a;#282828
    removed = #ff453a;#282828
    error = #ffffff;#ff453a

[widget-panel]
    sort-up-char = ↑
    sort-down-char = ↓
    hiddenfiles-show-char = ⋅
    hiddenfiles-hide-char = •
    history-prev-item-char = «
    history-next-item-char = »
    history-show-list-char = ^
    filename-scroll-left-char = «
    filename-scroll-right-char = »

[widget-editor]
    window-state-char = ↕
    window-close-char = ✕
