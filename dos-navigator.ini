[skin]
    description = skin inspired by Dos Navigator
    truecolors = true

[Lines]
    horiz = ─
    vert = │
    lefttop = ┌
    righttop = ┐
    leftbottom = └
    rightbottom = ┘
    topmiddle = ┬
    bottommiddle = ┴
    leftmiddle = ├
    rightmiddle = ┤
    cross = ┼
    dhoriz = ═
    dvert = ║
    dlefttop = ╔
    drighttop = ╗
    dleftbottom = ╚
    drightbottom = ╝
    dtopmiddle = ╤
    dbottommiddle = ╧
    dleftmiddle = ╟
    drightmiddle = ╢

[core]
    _default_ = #aaaaaa;#555555
    selected = #000000;#00aaaa
    marked = #ffff55;#555555
    markselect = #ffff55;#00aaaa
    gauge = #ffffff;#000000
    input = #ffffff;#000000
    inputunchanged = #aaaaaa;#000000
    inputmark = #ffff55;#000000
    disabled = #555555;#aaaaaa
    reverse = #555555;#aaaaaa
    commandlinemark = #000000;#aaaaaa
    header = #ffffff;#555555
    inputhistory = #ffffff;#000000
    commandhistory =
    shadow = #000000;#000000

[dialog]
    _default_ = #000000;#aaaaaa
    dfocus = #ffffff;#555555
    dhotnormal = #ffff55;#aaaaaa
    dhotfocus = #ffff55;#555555
    dtitle = #000000;#aaaaaa

[error]
    _default_ = #ffffff;#aa0000
    errdfocus = #000000;#aaaaaa
    errdhotnormal = #ffff55;#aa0000
    errdhotfocus = #ffff55;#aaaaaa
    errdtitle = #ffff55;#aa0000

[filehighlight]
    directory = #ffffff;
    executable = #55ff55;
    symlink = #55ffff;
    hardlink =
    stalelink = #ff5555;
    device = #ff55ff;
    special = #55ff55;
    core = #aa0000;
    temp = #aaaaaa;
    archive = #ff55ff;
    doc = #aa5500;
    source = #00aaaa;
    media = #00aa00;
    graph = #55ffff;
    database = #ff5555;

[menu]
    _default_ = #000000;#aaaaaa
    menusel = #000000;#00aa00
    menuhot = #aa0000;#aaaaaa
    menuhotsel = #aa0000;#00aa00
    menuinactive = #555555;#aaaaaa

[popupmenu]
    _default_ = #000000;#aaaaaa
    menusel = #000000;#00aa00
    menutitle = #000000;#aaaaaa

[buttonbar]
    hotkey = #aa0000;#aaaaaa
    button = #000000;#aaaaaa

[statusbar]
    _default_ = #000000;#aaaaaa

[help]
    _default_ = #ffff55;#00aaaa
    helpitalic = #55ff55;#00aaaa
    helpbold = #ffffff;#00aaaa
    helplink = #000000;#aaaaaa
    helpslink = #ffff55;#000000
    helptitle = #0000aa;#00aaaa

[editor]
    _default_ = #aaaaaa;#555555
    editbold = #ffff55;#00aa00
    editmarked = #000000;#00aaaa
    editwhitespace = #5555ff;#555555
    editlinestate = #ffffff;#00aaaa
    bookmark = #ffffff;#aa0000
    bookmarkfound = #000000;#00aa00
    editrightmargin = #5555ff;#000000
#    editbg =
#    editframe =
    editframeactive = #ffffff;
    editframedrag = #55ffff;

[viewer]
    _default_ = #aaaaaa;#555555
    viewbold = #ffff55;#555555
    viewunderline = #ff5555;#555555
    viewselected = #000000;#aaaaaa

[diffviewer]
    added = #ffffff;#00aa00
    changedline = #0000aa;#00aaaa
    changednew = #aa0000;#00aaaa
    changed = #ffffff;#00aaaa
    removed = #ffffff;#aa0000
    error = #aa0000;#aaaaaa

[widget-panel]
    sort-up-char = ↑
    sort-down-char = ↓
    hiddenfiles-show-char = ⋅
    hiddenfiles-hide-char = •
    history-prev-item-char = «
    history-next-item-char = »
    history-show-list-char = ^
    filename-scroll-left-char = «
    filename-scroll-right-char = »

[widget-editor]
    window-state-char = ↕
    window-close-char = ✕
